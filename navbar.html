<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Navigation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./navbar.css">

<body class="menu-page">
    <div class="page-shell menu-shell">
        <header class="menu-header">
            <a href="./index.html#hero" class="logo" aria-label="Return to homepage">
                <span class="logo-mark" aria-hidden="true"></span>
                <span class="logo-text">Anish Sharma</span>

            <a href="./index.html" class="menu-close" aria-label="Close navigation">
                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
            </a>
        </header>

        <main class="menu-main">
            <section class="menu-intro reveal">
                <p class="section-kicker">Quick Navigation</p>
                <h1>Explore the portfolio.</h1>
                <p>Move through the main sections or jump into the contact page from here.</p>
            </section>

            <nav class="menu-links" aria-label="Menu links">
                <a href="./index.html#hero" class="menu-link surface card-lift reveal reveal-delay-1">
                    <span>01</span>
                    <strong>Home</strong>
                    <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                </a>
                <a href="./index.html#projects" class="menu-link surface card-lift reveal reveal-delay-1">
                    <span>02</span>
                    <strong>Projects</strong>
                    <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                </a>
                <a href="./index.html#services" class="menu-link surface card-lift reveal reveal-delay-2">
                    <span>03</span>
                    <strong>Services</strong>
                    <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                </a>
                <a href="./index.html#about" class="menu-link surface card-lift reveal reveal-delay-2">
                    <span>04</span>
                    <strong>About Me</strong>
                    <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                </a>
                <a href="./contact.html" class="menu-link surface card-lift reveal reveal-delay-3">
                    <span>05</span>
                    <strong>Contact</strong>
                    <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                </a>
            </nav>

            <section class="menu-note surface reveal reveal-delay-3">
                <h2>Contact Information:</h2>
                <div class="menu-tags">
                    <span class="tag"><i class="fa-brands fa-github" aria-hidden="true"></i> GitHub</span>
                    <span class="tag"><i class="fa-brands fa-whatsapp" aria-hidden="true"></i> WhatsApp</span>
                    <span class="tag"><i class="fa-solid fa-phone" aria-hidden="true"></i> Phone</span>
                    <span class="tag"><i class="fa-brands fa-linkedin-in" aria-hidden="true"></i> LinkedIn</span>
                </div>
            </section>
        </main>
    </div>

</html>
